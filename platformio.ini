; PlatformIO Configuration File
; CardOS - Personal Modular Operating System
; For M5Stack Cardputer (ESP32-S3 Stamp S3A)

[env:m5stack-stamps3]
platform = espressif32@6.6.0
board = m5stack-stamps3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_LOOP_STACK_SIZE=32768
    -DBOARD_HAS_PSRAM
    -DCARDOS_BOARD_M5STACK_STAMPS3
    -DVSPI=2

lib_deps = 
    https://github.com/lovyan03/LovyanGFX.git

upload_port = /dev/cu.usbserial-*
